name: E2E - Preview Contract

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preview-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-e2e
      # Required so the `next dev` webServer can compile service-role API routes without throwing
      # `Missing SUPABASE_SERVICE_ROLE_KEY` when a request touches one (mirrors ci.yml). Dummy = compile-only.
      SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key-for-e2e
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run preview-contract E2E (mocked, no provider calls)
        run: npm run test:e2e:preview

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
