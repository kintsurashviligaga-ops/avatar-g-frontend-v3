name: AvatarG
options:
  bundleIdPrefix: ge.myavatar
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
settings:
  base:
    SWIFT_VERSION: "5.10"
    PRODUCT_BUNDLE_IDENTIFIER: ge.myavatar.app
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  AvatarG:
    type: application
    platform: iOS
    sources:
      - AvatarG
    resources:
      - AvatarG/Resources/PrivacyInfo.xcprivacy
    info:
      path: AvatarG/Info.plist
      properties:
        NSMicrophoneUsageDescription: "MyAvatar uses the microphone to record your voice for AI voice training and in-app voice commands."
        NSSpeechRecognitionUsageDescription: "MyAvatar uses speech recognition for Georgian and English voice input."
        NSCameraUsageDescription: "MyAvatar uses the camera to capture photos for AI avatar creation and image generation."
        NSPhotoLibraryUsageDescription: "MyAvatar accesses your photo library so you can pick photos for AI avatar and content creation."
        NSPhotoLibraryAddUsageDescription: "MyAvatar saves the images and videos you generate to your photo library."
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - audio
          - fetch
          - remote-notification
        CFBundleDisplayName: "MyAvatar"
        CFBundleName: "AvatarG"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        INFOPLIST_FILE: AvatarG/Info.plist
        APP_GROUP_ID: group.ge.myavatar.app
    dependencies:
      - target: AvatarGWidget
      - target: AvatarGWatch
    entitlements:
      path: AvatarG/AvatarG.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ge.myavatar.app

  AvatarGWidget:
    type: app-extension
    platform: iOS
    sources:
      - AvatarGWidget
    info:
      path: AvatarGWidget/Info.plist
      properties:
        CFBundleDisplayName: "MyAvatar"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ge.myavatar.app.widget
        INFOPLIST_FILE: AvatarGWidget/Info.plist
        APP_GROUP_ID: group.ge.myavatar.app
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SWIFT_VERSION: "5.10"
    entitlements:
      path: AvatarGWidget/AvatarGWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.ge.myavatar.app

  AvatarGWatch:
    type: application
    platform: watchOS
    sources:
      - AvatarGWatch
    info:
      path: AvatarGWatch/Info.plist
      properties:
        CFBundleDisplayName: "MyAvatar"
        WKApplication: true
        NSMicrophoneUsageDescription: "MyAvatar uses the microphone for voice commands on Apple Watch."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ge.myavatar.app.watchkitapp
        INFOPLIST_FILE: AvatarGWatch/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SWIFT_VERSION: "5.10"

packages:
  Starscream:
    url: https://github.com/daltoniam/Starscream
    from: "4.0.0"
  Nuke:
    url: https://github.com/kean/Nuke
    from: "12.0.0"
