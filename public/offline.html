<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Avatar G - Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(100% 120% at 50% 0%, #0f172a 0%, #05070a 70%);
        color: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        padding: 24px;
      }
      .card {
        width: min(420px, 100%);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(15, 23, 42, 0.72);
        backdrop-filter: blur(12px);
        padding: 20px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0;
        color: rgba(248, 250, 252, 0.78);
        line-height: 1.5;
      }
      .actions {
        margin-top: 16px;
        display: flex;
        gap: 10px;
      }
      button,
      a {
        appearance: none;
        border: 0;
        border-radius: 12px;
        padding: 10px 14px;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
      }
      button {
        background: #22d3ee;
        color: #020617;
      }
      a {
        background: rgba(255, 255, 255, 0.12);
        color: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>Avatar G could not reach the network. Reconnect and retry to continue your workspace.</p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">Retry</button>
        <a href="/ka/dashboard">Open Dashboard</a>
      </div>
    </div>
  </body>
</html>
