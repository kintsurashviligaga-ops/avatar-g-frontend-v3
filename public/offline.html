<!doctype html>
<html lang="ka">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MyAvatar — ოფლაინი / Offline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100dvh;
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Noto Sans Georgian', 'Segoe UI', Roboto, sans-serif;
      }
      body { display: grid; place-items: center; padding: 24px; }
      .card {
        width: min(440px, 100%);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.10);
        background: #000;
        padding: 28px 24px;
        text-align: center;
      }
      .glyph {
        width: 44px; height: 44px; margin: 0 auto 16px;
        display: grid; place-items: center;
        border-radius: 50%;
        background: rgba(244, 63, 94, 0.12);
        color: #fda4af;
        font-size: 22px;
      }
      h1 { margin: 0 0 6px; font-size: 20px; font-weight: 600; }
      .sub { margin: 0; color: rgba(255, 255, 255, 0.6); line-height: 1.55; font-size: 14px; }
      .actions {
        margin-top: 22px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
      }
      button, a.btn {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 10px 18px;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        font-size: 13px;
        line-height: 1.2;
        height: 40px;
        display: inline-flex; align-items: center; gap: 6px;
      }
      button { background: #fff; color: #000; }
      a.btn { background: #000; border: 1px solid rgba(255,255,255,0.16); color: #fff; }
      a.btn:hover { border-color: rgba(255,255,255,0.30); }
      .lang { margin-top: 18px; font-size: 11px; color: rgba(255,255,255,0.35); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="glyph">⌁</div>
      <h1>ინტერნეტი გათიშულია</h1>
      <p class="sub">MyAvatar ვერ უკავშირდება ქსელს. შეუერთდი და გადატვირთე გვერდი რომ გააგრძელო.</p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">გადატვირთვა</button>
        <a class="btn" href="/ka/dashboard">ჩატის გახსნა</a>
      </div>
      <div class="lang">You are offline · Вы офлайн</div>
    </div>
  </body>
</html>
