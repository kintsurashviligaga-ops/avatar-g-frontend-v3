<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgBase" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(960 540) rotate(90) scale(780 1380)">
      <stop offset="0" stop-color="#0C1A35"/>
      <stop offset="0.58" stop-color="#050B1A"/>
      <stop offset="1" stop-color="#030712"/>
    </radialGradient>

    <radialGradient id="auroraCyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(420 290) rotate(20) scale(620 290)">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.44"/>
      <stop offset="0.55" stop-color="#22D3EE" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="auroraViolet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1430 760) rotate(-12) scale(640 300)">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.40"/>
      <stop offset="0.58" stop-color="#8B5CF6" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="haze" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1010 180) rotate(8) scale(760 250)">
      <stop offset="0" stop-color="#60A5FA" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>

    <filter id="softNoise" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="9"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.04"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgBase)"/>
  <ellipse cx="420" cy="290" rx="620" ry="290" fill="url(#auroraCyan)"/>
  <ellipse cx="1430" cy="760" rx="640" ry="300" fill="url(#auroraViolet)"/>
  <ellipse cx="1010" cy="180" rx="760" ry="250" fill="url(#haze)"/>

